version: '3.8'

services:
  app:
    build: ./app
    container_name: app
    ports:
      - "8098:5000"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "4242:80"
    restart: always

  client:
    build: ./client
    container_name: client
    depends_on:
      - app
    restart: always
